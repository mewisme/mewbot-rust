name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.2.1). Leave empty to use Cargo.toml version."
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: mewbot

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}
        run: |
          set -euo pipefail

          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          else
            VERSION=$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["package"]["version"])')
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using version: ${VERSION}"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x86_64
            artifact_suffix: x86_64-unknown-linux-gnu
            bin_name: mewbot
          - runner: windows-latest
            os: windows
            arch: x86_64
            artifact_suffix: x86_64-pc-windows-msvc.exe
            bin_name: mewbot.exe

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.os }}

      - name: Build release binary
        run: cargo build --release --bin ${{ env.BIN_NAME }}

      - name: Prepare Linux asset metadata
        if: matrix.os == 'linux'
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          BIN_NAME: ${{ matrix.bin_name }}
          SUFFIX: ${{ matrix.artifact_suffix }}
          OS_NAME: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}
        run: |
          set -euo pipefail

          RELEASE_BIN="target/release/${BIN_NAME}"
          OUT_NAME="mewbot-${VERSION}-${SUFFIX}"

          cp "$RELEASE_BIN" "$OUT_NAME"
          chmod +x "$OUT_NAME"

          SIZE="$(wc -c < "$OUT_NAME" | tr -d '[:space:]')"
          SHA256="$(sha256sum "$OUT_NAME" | awk '{print $1}')"

          printf '%s\n' "{\"name\":\"$OUT_NAME\",\"os\":\"$OS_NAME\",\"arch\":\"$ARCH\",\"size\":$SIZE,\"sha256\":\"$SHA256\"}" > asset-info.json

      - name: Prepare Windows asset metadata
        if: matrix.os == 'windows'
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          BIN_NAME: ${{ matrix.bin_name }}
          SUFFIX: ${{ matrix.artifact_suffix }}
          OS_NAME: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}
        run: |
          $ErrorActionPreference = "Stop"

          $releaseBin = "target/release/$env:BIN_NAME"
          $outName = "mewbot-$env:VERSION-$env:SUFFIX"

          Copy-Item $releaseBin $outName -Force

          $size = (Get-Item $outName).Length
          $sha256 = (Get-FileHash $outName -Algorithm SHA256).Hash.ToLowerInvariant()

          $json = @{
            name   = $outName
            os     = $env:OS_NAME
            arch   = $env:ARCH
            size   = $size
            sha256 = $sha256
          } | ConvertTo-Json -Compress

          Set-Content -Path asset-info.json -Value $json -NoNewline

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: build-${{ matrix.os }}
          path: |
            mewbot-${{ needs.prepare.outputs.version }}-${{ matrix.artifact_suffix }}
            asset-info.json

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: false

      - name: Create latest.json
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG: ${{ needs.prepare.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          PUBLISHED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          FILES_JSON="$(jq -s . artifacts/build-*/asset-info.json)"

          jq -n \
            --arg version "$VERSION" \
            --arg current_version "$VERSION" \
            --arg tag "$TAG" \
            --arg published_at "$PUBLISHED_AT" \
            --arg repo "$REPO" \
            --argjson files "$FILES_JSON" \
            '{
              currentVersion: $current_version,
              version: $version,
              tag: $tag,
              publishedAt: $published_at,
              downloadUrlTemplate: ("https://github.com/" + $repo + "/releases/download/" + $tag + "/{filename}"),
              files: $files
            }' > latest.json

          cat latest.json

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets

          for dir in artifacts/build-*; do
            for f in "$dir"/*; do
              if [ -f "$f" ] && [ "$(basename "$f")" != "asset-info.json" ]; then
                cp "$f" release-assets/
              fi
            done
          done

          cp latest.json release-assets/
          ls -la release-assets/

      - name: Create Git tag if missing
        shell: bash
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail

          git fetch --tags

          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.tag }}
          files: release-assets/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}